name: Release

"on":
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build and validate release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip '.[dev]'
      - run: python -m unittest discover -s tests -v
      - run: python scripts/evaluate_contextir.py --check
      - run: python -m build
      - run: python -m twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: release-dists
          path: dist/
          retention-days: 1

  github-release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-dists
          path: dist/
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --verify-tag

  pypi-publish:
    name: Publish to PyPI
    needs: [build, github-release]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/contextir
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-dists
          path: dist/
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
